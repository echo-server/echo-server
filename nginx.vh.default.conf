# nginx.vh.default.conf - OpenResty server configuration
# This file is installed at `/etc/nginx/conf.d/default.conf`
# Loaded via the include directive in nginx.conf

server {
    listen       80;
    server_name  localhost;

    # Server error page redirection configuration
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/local/openresty/nginx/html;
    }

    # Silent hang route - accepts the request but never sends a response
    location = /hang {
        # Stop and clean up the Lua request handler when the client disconnects.
        lua_check_client_abort on;

        content_by_lua_block {
            -- Consume request bodies so POST requests do not leave unread data.
            ngx.req.discard_body()

            -- ngx.sleep yields to the Nginx event loop, so this does not block a
            -- worker thread. lua_check_client_abort terminates the handler when
            -- the downstream connection is closed.
            while true do
                ngx.sleep(3600)
            end
        }
    }

    # Main route - Echo server
    location / {
        lua_need_request_body on;
        content_by_lua_block {
            ngx.header["Server"] = "echoserver"

            local headers = ngx.req.get_headers()
            local keys = {}
            for key, val in pairs(headers) do
                table.insert(keys, key)
            end
            table.sort(keys)

            ngx.say(tmpl({os=os, ngx=ngx, keys=keys, headers=headers}))
        }
    }
}
